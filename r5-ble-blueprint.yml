blueprint:
  name: Passive BLE Monitor - 6 button switch with auto reset
  description: >-
    Blueprint for a 6-button BLE scene switch exposed as six sensor entities
    via Passive BLE Monitor. Supports three actions per button: single press,
    double press, and long press. After any detected press, the selected reset
    helper is immediately returned to 'no press'.
  domain: automation
  homeassistant:
    min_version: 2026.5.2
  input:
    top_left_sensor:
      name: Top left sensor
      selector:
        entity:
          domain: sensor
    top_middle_sensor:
      name: Top middle sensor
      selector:
        entity:
          domain: sensor
    top_right_sensor:
      name: Top right sensor
      selector:
        entity:
          domain: sensor
    bottom_left_sensor:
      name: Bottom left sensor
      selector:
        entity:
          domain: sensor
    bottom_middle_sensor:
      name: Bottom middle sensor
      selector:
        entity:
          domain: sensor
    bottom_right_sensor:
      name: Bottom right sensor
      selector:
        entity:
          domain: sensor

    top_left_reset_helper:
      name: Top left reset helper
      description: Optional input_text helper mirrored to the last press and then reset to no press
      default: null
      selector:
        entity:
          domain: input_text
    top_middle_reset_helper:
      name: Top middle reset helper
      default: null
      selector:
        entity:
          domain: input_text
    top_right_reset_helper:
      name: Top right reset helper
      default: null
      selector:
        entity:
          domain: input_text
    bottom_left_reset_helper:
      name: Bottom left reset helper
      default: null
      selector:
        entity:
          domain: input_text
    bottom_middle_reset_helper:
      name: Bottom middle reset helper
      default: null
      selector:
        entity:
          domain: input_text
    bottom_right_reset_helper:
      name: Bottom right reset helper
      default: null
      selector:
        entity:
          domain: input_text

    reset_delay_ms:
      name: Reset delay
      description: Delay before helper returns to no press
      default: 0
      selector:
        number:
          min: 0
          max: 5000
          step: 100
          unit_of_measurement: ms
          mode: box

    top_left_single:
      name: Top left - single press
      default: []
      selector:
        action: {}
    top_left_double:
      name: Top left - double press
      default: []
      selector:
        action: {}
    top_left_long:
      name: Top left - long press
      default: []
      selector:
        action: {}
    top_middle_single:
      name: Top middle - single press
      default: []
      selector:
        action: {}
    top_middle_double:
      name: Top middle - double press
      default: []
      selector:
        action: {}
    top_middle_long:
      name: Top middle - long press
      default: []
      selector:
        action: {}
    top_right_single:
      name: Top right - single press
      default: []
      selector:
        action: {}
    top_right_double:
      name: Top right - double press
      default: []
      selector:
        action: {}
    top_right_long:
      name: Top right - long press
      default: []
      selector:
        action: {}
    bottom_left_single:
      name: Bottom left - single press
      default: []
      selector:
        action: {}
    bottom_left_double:
      name: Bottom left - double press
      default: []
      selector:
        action: {}
    bottom_left_long:
      name: Bottom left - long press
      default: []
      selector:
        action: {}
    bottom_middle_single:
      name: Bottom middle - single press
      default: []
      selector:
        action: {}
    bottom_middle_double:
      name: Bottom middle - double press
      default: []
      selector:
        action: {}
    bottom_middle_long:
      name: Bottom middle - long press
      default: []
      selector:
        action: {}
    bottom_right_single:
      name: Bottom right - single press
      default: []
      selector:
        action: {}
    bottom_right_double:
      name: Bottom right - double press
      default: []
      selector:
        action: {}
    bottom_right_long:
      name: Bottom right - long press
      default: []
      selector:
        action: {}

mode: parallel
max: 30

variables:
  top_left_reset_helper: !input top_left_reset_helper
  top_middle_reset_helper: !input top_middle_reset_helper
  top_right_reset_helper: !input top_right_reset_helper
  bottom_left_reset_helper: !input bottom_left_reset_helper
  bottom_middle_reset_helper: !input bottom_middle_reset_helper
  bottom_right_reset_helper: !input bottom_right_reset_helper

trigger:
  - platform: state
    entity_id: !input top_left_sensor
    id: top_left
  - platform: state
    entity_id: !input top_middle_sensor
    id: top_middle
  - platform: state
    entity_id: !input top_right_sensor
    id: top_right
  - platform: state
    entity_id: !input bottom_left_sensor
    id: bottom_left
  - platform: state
    entity_id: !input bottom_middle_sensor
    id: bottom_middle
  - platform: state
    entity_id: !input bottom_right_sensor
    id: bottom_right

condition:
  - condition: template
    value_template: >-
      {{ trigger.to_state is not none and trigger.to_state.state in ['single press', 'double press', 'long press'] }}

action:
  - variables:
      pressed_state: "{{ trigger.to_state.state }}"
      reset_helper: >-
        {% if trigger.id == 'top_left' %}{{ top_left_reset_helper }}
        {% elif trigger.id == 'top_middle' %}{{ top_middle_reset_helper }}
        {% elif trigger.id == 'top_right' %}{{ top_right_reset_helper }}
        {% elif trigger.id == 'bottom_left' %}{{ bottom_left_reset_helper }}
        {% elif trigger.id == 'bottom_middle' %}{{ bottom_middle_reset_helper }}
        {% else %}{{ bottom_right_reset_helper }}
        {% endif %}

  - if:
      - condition: template
        value_template: "{{ reset_helper is string and reset_helper | length > 0 }}"
    then:
      - service: input_text.set_value
        target:
          entity_id: "{{ reset_helper }}"
        data:
          value: "{{ pressed_state }}"

  - choose:
      - conditions:
          - condition: trigger
            id: top_left
          - condition: template
            value_template: "{{ pressed_state == 'single press' }}"
        sequence: !input top_left_single
      - conditions:
          - condition: trigger
            id: top_left
          - condition: template
            value_template: "{{ pressed_state == 'double press' }}"
        sequence: !input top_left_double
      - conditions:
          - condition: trigger
            id: top_left
          - condition: template
            value_template: "{{ pressed_state == 'long press' }}"
        sequence: !input top_left_long

      - conditions:
          - condition: trigger
            id: top_middle
          - condition: template
            value_template: "{{ pressed_state == 'single press' }}"
        sequence: !input top_middle_single
      - conditions:
          - condition: trigger
            id: top_middle
          - condition: template
            value_template: "{{ pressed_state == 'double press' }}"
        sequence: !input top_middle_double
      - conditions:
          - condition: trigger
            id: top_middle
          - condition: template
            value_template: "{{ pressed_state == 'long press' }}"
        sequence: !input top_middle_long

      - conditions:
          - condition: trigger
            id: top_right
          - condition: template
            value_template: "{{ pressed_state == 'single press' }}"
        sequence: !input top_right_single
      - conditions:
          - condition: trigger
            id: top_right
          - condition: template
            value_template: "{{ pressed_state == 'double press' }}"
        sequence: !input top_right_double
      - conditions:
          - condition: trigger
            id: top_right
          - condition: template
            value_template: "{{ pressed_state == 'long press' }}"
        sequence: !input top_right_long

      - conditions:
          - condition: trigger
            id: bottom_left
          - condition: template
            value_template: "{{ pressed_state == 'single press' }}"
        sequence: !input bottom_left_single
      - conditions:
          - condition: trigger
            id: bottom_left
          - condition: template
            value_template: "{{ pressed_state == 'double press' }}"
        sequence: !input bottom_left_double
      - conditions:
          - condition: trigger
            id: bottom_left
          - condition: template
            value_template: "{{ pressed_state == 'long press' }}"
        sequence: !input bottom_left_long

      - conditions:
          - condition: trigger
            id: bottom_middle
          - condition: template
            value_template: "{{ pressed_state == 'single press' }}"
        sequence: !input bottom_middle_single
      - conditions:
          - condition: trigger
            id: bottom_middle
          - condition: template
            value_template: "{{ pressed_state == 'double press' }}"
        sequence: !input bottom_middle_double
      - conditions:
          - condition: trigger
            id: bottom_middle
          - condition: template
            value_template: "{{ pressed_state == 'long press' }}"
        sequence: !input bottom_middle_long

      - conditions:
          - condition: trigger
            id: bottom_right
          - condition: template
            value_template: "{{ pressed_state == 'single press' }}"
        sequence: !input bottom_right_single
      - conditions:
          - condition: trigger
            id: bottom_right
          - condition: template
            value_template: "{{ pressed_state == 'double press' }}"
        sequence: !input bottom_right_double
      - conditions:
          - condition: trigger
            id: bottom_right
          - condition: template
            value_template: "{{ pressed_state == 'long press' }}"
        sequence: !input bottom_right_long

  - if:
      - condition: template
        value_template: "{{ reset_helper is string and reset_helper | length > 0 }}"
    then:
      - delay:
          milliseconds: !input reset_delay_ms
      - service: input_text.set_value
        target:
          entity_id: "{{ reset_helper }}"
        data:
          value: "no press"
